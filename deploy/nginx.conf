upstream backend_upstream {
    server backend:3001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Frontend estático
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Assets estáticos com cache longo (Vite gera hashes nos nomes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── ROTAS EXCLUSIVAMENTE DE BACKEND ───
    # (sempre para o backend, nunca SPA)

    location /health {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ready {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /admin/queues {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── ROTAS MISTAS (back-end API / front-end SPA) ───
    # Qualquer requisição POST/PUT/PATCH/DELETE → backend
    # Qualquer requisição GET com ?token= → backend (WebSocket fallback)
    # GET com header Accept: application/json → backend
    # GET normal → SPA (index.html)

    location ~ ^/(auth|agents|admin|conversations|knowledge|whatsapp|tickets|queues|contacts|quick-replies|tags|media|ratings|internal-chat|campaigns|webhooks|reports|voice-profiles|settings|users|business-hours|2fa|license|payments|download)(/|$) {
        # POST/PUT/PATCH/DELETE sempre vão para o backend
        if ($request_method = POST) { proxy_pass http://backend_upstream; break; }
        if ($request_method = PUT) { proxy_pass http://backend_upstream; break; }
        if ($request_method = PATCH) { proxy_pass http://backend_upstream; break; }
        if ($request_method = DELETE) { proxy_pass http://backend_upstream; break; }

        # GET com Accept: application/json vai para o backend
        if ($http_accept ~ application/json) { proxy_pass http://backend_upstream; break; }

        # GET com query param token vai para o backend (WebSocket auth fallback)
        if ($arg_token) { proxy_pass http://backend_upstream; break; }

        # GET normal: serve o SPA
        try_files $uri $uri/ /index.html;
    }

    # ─── SPA FALLBACK ───
    location / {
        try_files $uri $uri/ /index.html;
    }
}
