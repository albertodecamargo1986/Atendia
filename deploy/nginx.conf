upstream backend_upstream {
    server backend:3001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Frontend estático
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Assets estáticos com cache longo (Vite gera hashes nos nomes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + rotas do backend — proxy reverso
    location ~ ^/(auth|agents|conversations|knowledge|whatsapp|tickets|queues|contacts|quick-replies|tags|media|ratings|internal-chat|campaigns|webhooks|reports|voice-profiles|settings|users|business-hours|2fa|license|payments|download|health|ready|uploads)/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Socket.io — WebSocket
    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Bull Board (admin)
    location /admin/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — tudo que não casar acima cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
