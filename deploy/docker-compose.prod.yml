# AtendIA — Docker Compose para PRODUÇÃO
# Uso: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_USER: atend
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mude-esta-senha}
      POSTGRES_DB: atend_ia
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atend"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --save 60 1 --save 300 10 --save 900 1 --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD:-mude-esta-senha-redis}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mude-esta-senha-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://atend:${DB_PASSWORD:-mude-esta-senha}@postgres:5432/atend_ia
      REDIS_URL: redis://:${REDIS_PASSWORD:-mude-esta-senha-redis}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_AI_MODEL: ${DEFAULT_AI_MODEL:-gpt-4o-mini}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:?SESSION_ENCRYPTION_KEY is required — set a strong 32+ char key in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
      LOG_LEVEL: info
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-"AtendIA <noreply@atend-ia.com>"}
    volumes:
      - uploads:/app/uploads
      - whatsapp-sessions:/app/packages/backend/sessions

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../packages/frontend/dist:/usr/share/nginx/html:ro

volumes:
  pgdata:
  redisdata:
  uploads:
  whatsapp-sessions:
